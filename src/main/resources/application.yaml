spring:
  docker:
    compose:
      lifecycle-management: start-and-stop
  threads:
    virtual:
      enabled: true
  cache:
    type: redis
    redis:
      time-to-live: 120s        # TTL — cache expires after 2 mins
      cache-null-values: false
  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase
    username: myuser
    password: secret
    hikari:
      pool-name: FastShopping-Pool
      # Bumped to 150 to absorb the Virtual Thread queue
      maximum-pool-size: 50
      minimum-idle: 10
      # Fail fast: Drop requests instantly rather than hanging for 3 seconds
      connection-timeout: 2000
      idle-timeout: 600000
      max-lifetime: 1800000
      # JMX overhead disabled for absolute maximum performance
      register-mbeans: false

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc.batch_size: 100
        order_inserts: true
        order_updates: true
        jdbc.lob.non_contextual_creation: true

server:
  tomcat:
    max-connections: 2000
    accept-count: 2000
