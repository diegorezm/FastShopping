services:
  postgres:
    image: postgres:18-alpine  
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: secret
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=2GB
        -c effective_cache_size=6GB
        -c work_mem=16MB
        -c maintenance_work_mem=256MB
        -c max_parallel_workers_per_gather=2
        -c max_parallel_workers=2
        -c parallel_setup_cost=0
        -c parallel_tuple_cost=0
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G  # RDS db.t4g.medium
        reservations:
          cpus: "1.0"
          memory: 2G
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U myuser -d mydatabase" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 768mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G  # Simulando ElastiCache cache.t4g.micro
        reservations:
          cpus: "0.25"
          memory: 512M
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/mydatabase
      DB_USERNAME: myuser
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      HIKARI_MAX_POOL_SIZE: 20
      HIKARI_MIN_IDLE: 10
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G  # AWS ec2 t3.medium (2 vCPU / 4GB)
        reservations:
          cpus: "1.0"
          memory: 2G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
